########## CONFIGURATION ##########
#
# Default config (--config_file configs/base.yml).
#
# Sampling matches parent ToxSearch-S for SOTA comparison:
#   target_llm  ↔  config/RGConfig.yaml  (response_generator.generation_args)
#   mutator_llm ↔  config/PGConfig.yaml (prompt_generator.generation_args)
#   temperature, top_p, top_k, max_tokens (vLLM uses max_tokens = llama.cpp max_new_tokens).
# repetition_penalty matches llama.cpp RG/PG (vLLM SamplingParams).
#
# Use a Hugging Face model id for vLLM model loading.
# Example (Llama 3.2 3B Instruct): meta-llama/Llama-3.2-3B-Instruct
# NOTE: "Meta-Llama-..." is not a valid repo name here; use "Llama-...".
# Local GGUF paths often fail in this vLLM codepath.
# CLI --target_llm overrides target model_kwargs["model"] only.


# Archive Configuration
archive:
  path: [./configs/categories/categories.txt, ./configs/styles/styles.txt]
  descriptor: [Risk Category, Attack Style]

# Seed dataset
sample_prompts: ./data/toxsearch_seed.jsonl


# Target LLM Configuration — RG-aligned: temperature 0.8, top_p 0.9, top_k 40, max 2048
target_llm:
  type_: vllm

  model_kwargs:
    model: meta-llama/Llama-3.2-3B-Instruct
    tokenizer: meta-llama/Llama-3.2-3B-Instruct
    trust_remote_code: True
    max_model_len: 4096
    gpu_memory_utilization: 0.8

  sampling_params:
    temperature: 0.8
    top_p: 0.9
    top_k: 40
    max_tokens: 2048
    repetition_penalty: 1.0


# Mutator LLM Configuration — PG-aligned: temperature 0.9, top_p 0.9, top_k 40, max 2048
# Same model_kwargs as target_llm so RainbowPlus loads one shared vLLM instance.
mutator_llm:
  type_: vllm

  model_kwargs:
    model: meta-llama/Llama-3.2-3B-Instruct
    tokenizer: meta-llama/Llama-3.2-3B-Instruct
    trust_remote_code: True
    max_model_len: 4096
    gpu_memory_utilization: 0.8

  sampling_params:
    temperature: 0.9
    top_p: 0.9
    top_k: 40
    max_tokens: 2048
    repetition_penalty: 1.1


# Fitness LLM Configuration (reference / Llama-Guard runs; PerspectiveScorer ignores this for API fitness)
fitness_llm:
  type_: vllm

  model_kwargs:
    model: meta-llama/Llama-Guard-3-1B
    trust_remote_code: True
    gpu_memory_utilization: 0.15
    max_model_len: 4096

  sampling_params:
    temperature: 0.7
    top_p: 0.9
    max_tokens: 16
    logprobs: 1


